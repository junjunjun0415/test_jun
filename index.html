<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カウンター</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: sans-serif;
    background: #f0f0f0;
  }
  .counter {
    text-align: center;
  }
  #count {
    font-size: 6rem;
    margin: 0 0 1rem;
  }
  button {
    font-size: 1.5rem;
    padding: 0.5rem 2rem;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    background: #0000ff;
    color: #fff;
  }
  button:active {
    background: #0000cc;
  }
</style>
</head>
<body>
<div class="counter">
  <p id="count">0</p>
  <button id="btn">カウントアップ</button>
  <button id="reset-btn">リセット</button>
</div>
<script>
  let count = 0;
  const display = document.getElementById('count');
  document.getElementById('btn').addEventListener('click', () => {
    display.textContent = ++count;
  });
  document.getElementById('reset-btn').addEventListener('click', () => {
    count = 0;
    display.textContent = count;
  });
</script>
</body>
</html>
